# Configuration for the GA prompt optimization experiment.

improver:
  model: meta/llama-3.1-70b-instruct   # NIM model for directed mutation
  top_k: 3                              # number of top prompts fed to the improver
  n_variants: 3                         # improved variants generated per generation

ga:
  population_size: 20
  generations: 30
  elite_count: 2
  crossover_rate: 0.7
  mutation_rate: 0.3
  tournament_k: 3

fitness:
  max_prompt_tokens: 200
  lambda_len: 0.1
  lambda_fmt: 0.2
  alpha: 0.5  # blend weight: alpha * ROUGE-L + (1 - alpha) * cosine

evaluation:
  eval_subset: null   # null = use all 500 files; set to an int for fast inner-loop evals
